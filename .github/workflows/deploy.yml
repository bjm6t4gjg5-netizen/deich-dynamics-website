# Automatisches Deployment nach GitHub Pages.
# Bei jedem Push auf den main-Branch:
#  1. Code auschecken
#  2. Abhängigkeiten installieren
#  3. `npm run build` ausführen
#  4. Den dist-Ordner als statisches Artefakt nach GitHub Pages publizieren
#
# Voraussetzung: Im Repo unter Settings → Pages → Source: "GitHub Actions" wählen.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Erlaubt manuelles Anstoßen über die Actions-UI
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Stellt sicher, dass jeweils nur ein Deploy zur Zeit läuft
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
