<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Deich Dynamics Solutions">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ece1c8"/>
      <stop offset="0.55" stop-color="#dccfb4"/>
      <stop offset="1" stop-color="#9aa994"/>
    </linearGradient>
  </defs>

  <!-- Sandiger Hintergrund -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Sehr dezenter Lichthauch in der Ecke -->
  <circle cx="1080" cy="120" r="180" fill="#ffffff" opacity="0.10"/>

  <!-- Wellenkante am Boden -->
  <path d="M0,540 C220,490 440,600 720,540 C1000,480 1200,580 1200,580 L1200,630 L0,630 Z"
        fill="#1d3f36" opacity="0.94"/>

  <!-- Logo-Mark -->
  <g transform="translate(96 200) scale(1.15)" fill="#1d3f36">
    <path d="M 121 21 A 82 82 0 0 1 93 181" fill="none" stroke="#1d3f36" stroke-width="14"/>
    <path d="M 79 179 A 82 82 0 0 1 107 18" fill="none" stroke="#1d3f36" stroke-width="14"/>
    <rect x="107" y="0"  width="14" height="118"/>
    <rect x="79"  y="82" width="14" height="118"/>
  </g>

  <!-- Wordmark + Tagline -->
  <g fill="#1d3f36" font-family="'Inter','DejaVu Sans','Helvetica Neue',Arial,sans-serif">
    <text x="380" y="288" font-size="80" font-weight="700" letter-spacing="-2">Deich Dynamics</text>
    <text x="382" y="338" font-size="28" font-weight="400" letter-spacing="14" opacity="0.78">S O L U T I O N S</text>
    <text x="380" y="420" font-size="28" font-weight="400" opacity="0.78">
      Maßgeschneiderte FinTech- &amp; Buchhaltungssoftware.
    </text>
    <text x="380" y="455" font-size="22" font-weight="400" letter-spacing="6" opacity="0.55">
      ST. PETER-ORDING · NORDFRIESLAND
    </text>
  </g>
</svg>
